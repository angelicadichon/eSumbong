<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>eSumbong | Login</title>

  <!-- Use a relative path that matches where your CSS file actually lives.
       If your CSS is at public/css/style.css (relative to this HTML file), use that.
       If this file is served from a subpath (e.g. GitHub Pages /eSumbong/), avoid leading slashes. -->
  <link rel="stylesheet" href="public/css/style.css">
</head>
<body>
  <div class="login-container">
    <h2>Welcome to eSumbong</h2>
    <p>Login to access your dashboard and report barangay concerns.</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" name="username" placeholder="Enter username" required>
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn-login">Login</button>
    </form>

    <p id="loginMessage" class="message"></p>

    <div class="register-link">
      <p>Don’t have an account?
        <!-- Relative link to the register page -->
        <a href="views/index.html">Register here</a>
      </p>
    </div>
  </div>

  <!-- Use a relative path that matches where your JS file actually lives.
       If your JS is in public/js/auth.js, reference it like this (no leading slash). -->
  <script src="public/js/auth.js" defer></script>
</body>
</html>
