<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSumbong | Login</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <div class="login-container">
        <h2>Welcome Back to eSumbong</h2>
        <p>Log in to access your reports and dashboard.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" name="email" placeholder="Enter email address" required />
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" placeholder="Enter password" required />
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <p id="loginMessage" class="message"></p>

        <div class="register-link">
            <p>Don't have an account?
                <a href="/register">Register here</a>
            </p>
        </div>
    </div>
    <script src="/js/auth.js" defer></script>
</body>
</html>
