<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eSumbong | Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="register-container">
    <h2>Create Your eSumbong Account</h2>
    <p>Register to start submitting and tracking barangay complaints.</p>

    <form id="registerForm">
      <div class="form-group">
        <label for="regUsername">Username</label>
        <input type="text" id="regUsername" name="username" placeholder="Enter username" required />
      </div>

      <div class="form-group">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" name="password" placeholder="Enter password" required />
      </div>

      <button type="submit" class="btn-register">Register</button>
    </form>

    <p id="registerMessage" class="message"></p>

    <div class="login-link">
      <p>Already have an account?
        <a href="login.html">Login here</a>
      </p>
    </div>
  </div>

  <script src="js/auth.js" defer></script>
</body>
</html>
